apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod
  labels:
    kai.scheduler/queue: test
    app: sre-haiku
  annotations:
    kai.scheduler/gpu-fraction: "0.5"  # Request half GPU
spec:
  schedulerName: kai-scheduler
  runtimeClassName: nvidia
  nodeSelector:
    nvidia.com/gpu.present: "true"
  containers:
  - name: sre-haiku
    image: piotrzan/sre-haiku-generator:latest
    ports:
    - containerPort: 5000
    env:
    - name: NVIDIA_VISIBLE_DEVICES
      value: "all"
    # The haiku app is an OpenAI-compatible client (defaults to a local Ollama
    # at localhost:11434). Point it at OpenAI so generation works on stage.
    - name: LLM_URL
      value: "https://api.openai.com"
    - name: LLM_MODEL
      value: "gpt-4o-mini"
    - name: LLM_API_KEY
      valueFrom:
        secretKeyRef:
          name: openai-secret
          key: api-key